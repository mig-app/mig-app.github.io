<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>повторяй · mig</title>
<meta name="description" content="hear a russian word, repeat it aloud, get scored. a small pronunciation trainer from mig, right in the browser.">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="repeat.css">
</head>
<body>
<main>
  <header class="rhead">
    <a class="logo" href="../">
      <span class="cyrillic">МИГ</span>
      <span class="latin">MiG</span>
    </a>
    <div class="score" id="score"></div>
  </header>

  <h1>повторяй</h1>
  <div class="rule"></div>
  <p class="rlede" id="lede">послушай и повтори вслух. я оценю произношение.</p>

  <!-- picker: warm-up sets + the ready-made mig vocabulary -->
  <section id="v-pick">
    <div id="pickList"></div>
  </section>

  <!-- practice: one word at a time, walk with назад / дальше -->
  <section id="v-practice" hidden>
    <div class="practicetop">
      <button class="crumb" id="back" type="button">к наборам</button>
      <div class="pos" id="pos"></div>
    </div>

    <div class="rcard">
      <div class="ru" id="ru"></div>
      <div class="en" id="en"></div>
      <div class="translit" id="translit"></div>
      <button class="listen" id="listen" type="button">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden><path d="M2 6v4M5 3.5v9M8 5v6M11 4v8M14 6.5v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        прослушать
      </button>
    </div>

    <div class="mic-wrap">
      <button class="mic" id="mic" type="button" aria-label="говорить">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden>
          <rect x="9" y="3" width="6" height="11" rx="3" fill="currentColor"/>
          <path d="M6 11a6 6 0 0 0 12 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 17v3M9 20h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="status" id="status">нажми и повтори</div>
    </div>

    <div class="result" id="result" hidden></div>

    <div class="navrow">
      <button class="nav" id="prev" type="button" aria-label="предыдущее слово">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden><path d="M10 3 L5 8 L10 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        назад
      </button>
      <button class="nav" id="next" type="button" aria-label="следующее слово">
        дальше
        <svg viewBox="0 0 16 16" fill="none" aria-hidden><path d="M6 3 L11 8 L6 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <p id="srnote" hidden>
      оценка произношения работает лучше всего в chrome (нужен доступ к микрофону).
      в других браузерах можно слушать и повторять, но без оценки.
    </p>
  </section>

  <footer>
    <a href="../">mig</a> ·
    <a href="../cards/">карточки</a> ·
    <a href="../support.html">support</a> ·
    <a href="../privacy.html">privacy</a>
  </footer>
</main>
<script src="phrases.js"></script>
<script src="../mig-sets.js"></script>
<script src="score.js"></script>
<script src="repeat.js"></script>
</body>
</html>
