<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>карточки · mig</title>
<meta name="description" content="make or import a deck of russian vocabulary and review it with flashcards. tap to flip, tap the speaker to hear the word.">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="cards.css">
</head>
<body>
<main>
  <header class="rhead">
    <a class="logo" href="../">
      <span class="cyrillic">МИГ</span>
      <span class="latin">MiG</span>
    </a>
    <div class="crumb" id="crumb"></div>
  </header>

  <h1>карточки</h1>
  <div class="rule"></div>
  <p class="lede" id="lede">выбери готовый набор миг, сделай свою колоду или вставь список. нажми на карточку, чтобы перевернуть.</p>

  <!-- decks -->
  <section id="v-decks">
    <div class="decks" id="deckList"></div>
    <div class="btnrow">
      <button class="btn" id="newDeck" type="button">новая колода</button>
      <button class="btn" id="importDeck" type="button">вставить список</button>
    </div>
    <div class="sets" id="migSets"></div>
  </section>

  <!-- editor -->
  <section id="v-edit" hidden>
    <label class="field">
      <span class="flabel">название колоды</span>
      <input id="deckName" type="text" placeholder="моя колода" autocomplete="off">
    </label>
    <div class="rows" id="rows"></div>
    <div class="btnrow">
      <button class="btn ghost" id="addRow" type="button">ещё строка</button>
      <button class="btn" id="saveDeck" type="button">сохранить</button>
      <button class="btn ghost" id="cancelEdit" type="button">назад</button>
      <button class="btn danger" id="deleteDeck" type="button" hidden>удалить</button>
    </div>
  </section>

  <!-- import -->
  <section id="v-import" hidden>
    <p class="hint">одна пара на строку: русское слово, потом перевод. разделяй табом, запятой или дефисом.</p>
    <textarea id="importText" rows="10" spellcheck="false" placeholder="привет, hi&#10;вода, water&#10;спасибо, thank you"></textarea>
    <div class="pcount" id="pcount"></div>
    <div class="btnrow">
      <button class="btn" id="doImport" type="button">создать колоду</button>
      <button class="btn ghost" id="cancelImport" type="button">назад</button>
    </div>
  </section>

  <!-- review -->
  <section id="v-review" hidden>
    <div class="revbar">
      <span class="pos" id="pos"></span>
      <div class="revacts">
        <button class="chip" id="shuffle" type="button">перемешать</button>
        <button class="chip" id="exitReview" type="button">к колодам</button>
      </div>
    </div>

    <div class="card" id="card" tabindex="0" role="button" aria-label="карточка, нажми чтобы перевернуть">
      <div class="card-inner" id="cardInner">
        <div class="face front">
          <button class="speak" id="speak" type="button" aria-label="прослушать">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden>
              <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/>
              <path d="M16.5 8.5a5 5 0 0 1 0 7M19 6a8.5 8.5 0 0 1 0 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="term" id="front"></div>
        </div>
        <div class="face back">
          <div class="term back-term" id="back"></div>
        </div>
      </div>
    </div>
    <div class="flip-hint" id="flipHint">нажми на карточку, чтобы перевернуть</div>

    <div class="navrow">
      <button class="btn ghost" id="prev" type="button">назад</button>
      <button class="btn" id="next" type="button">дальше</button>
    </div>
  </section>

  <footer>
    <a href="../">mig</a> ·
    <a href="../repeat/">повторяй</a> ·
    <a href="../support.html">support</a> ·
    <a href="../privacy.html">privacy</a>
  </footer>
</main>
<script src="../mig-sets.js"></script>
<script src="cards.js"></script>
</body>
</html>
